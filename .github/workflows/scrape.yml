name: 自動更新課程資料

on:
  schedule:
    - cron: '0 */3 * * *'   # 每 3 小時執行一次
  workflow_dispatch:          # 允許手動觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install requests beautifulsoup4 lxml

      - name: 執行爬蟲
        run: python run.py --past-days 7

      - name: 推送更新資料
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git diff --staged --quiet || git commit -m "chore: 自動更新課程資料 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
