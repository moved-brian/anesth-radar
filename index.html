<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>麻醉科進修雷達</title>
<style>
/* ── Token System ─────────────────────────────────────────────
   Palette: deep navy (#0f1f3d) × cool white (#f5f7fa) × 
            electric teal accent (#00bfae) × warm amber (#f5a623)
   Type: system UI stack (no external font load needed for speed)
   Signature: the "pulse" dot on the header — a live indicator
              that implies real-time monitoring, like an OR monitor
─────────────────────────────────────────────────────────────── */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #0f1f3d;
  --navy-mid:   #1a3260;
  --navy-light: #243d72;
  --teal:       #00bfae;
  --teal-dim:   #009e90;
  --amber:      #f5a623;
  --white:      #f5f7fa;
  --gray-100:   #eef0f4;
  --gray-200:   #dde1ea;
  --gray-400:   #9aa3b5;
  --gray-600:   #5a6480;
  --text:       #1a2340;
  --radius:     6px;
  --shadow:     0 2px 12px rgba(15,31,61,0.10);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
               sans-serif;
  background: var(--white);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
}

/* ── HEADER ─────────────────────────────────────────────────── */
header {
  background: var(--navy);
  color: #fff;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 54px;
  gap: 16px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: inherit;
}
.logo-pulse {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--teal);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 0 0 rgba(0,191,174,0.4);
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0   rgba(0,191,174,0.5); }
  70%  { box-shadow: 0 0 0 8px rgba(0,191,174,0);   }
  100% { box-shadow: 0 0 0 0   rgba(0,191,174,0);   }
}
.logo-text { font-size: 16px; font-weight: 700; letter-spacing: 0.01em; }
.logo-sub  { font-size: 11px; color: var(--gray-400); font-weight: 400; }

.header-meta {
  font-size: 11px;
  color: var(--gray-400);
  white-space: nowrap;
}
.header-meta span { color: var(--teal); font-weight: 600; }

/* ── NAV TABS ────────────────────────────────────────────────── */
.tabs {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--navy-light);
}
.tabs-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  gap: 0;
  padding: 0 20px;
}
.tab-btn {
  background: none; border: none; cursor: pointer;
  padding: 10px 18px;
  font-size: 13px; font-weight: 500;
  color: var(--gray-400);
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.tab-btn:hover  { color: #fff; }
.tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

/* ── LAYOUT ──────────────────────────────────────────────────── */
.page { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* ── FILTER BAR ──────────────────────────────────────────────── */
.filter-bar {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  box-shadow: var(--shadow);
}
.filter-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-600);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.filter-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.chip {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--gray-200);
  background: var(--gray-100);
  font-size: 12px;
  cursor: pointer;
  color: var(--gray-600);
  transition: all 0.12s;
  white-space: nowrap;
  user-select: none;
}
.chip:hover  { border-color: var(--teal); color: var(--teal); }
.chip.active { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 600; }

.filter-divider {
  width: 1px; height: 24px; background: var(--gray-200);
  flex-shrink: 0;
}

.toggle-past {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; user-select: none;
  font-size: 12px; color: var(--gray-600);
  white-space: nowrap;
}
.toggle-past input[type=checkbox] { accent-color: var(--teal); width: 14px; height: 14px; }

.filter-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--gray-400);
  white-space: nowrap;
}
.filter-count b { color: var(--teal); }

/* ── EVENT LIST ──────────────────────────────────────────────── */
#view-list { display: block; }
#view-calendar { display: none; }

.event-list { display: flex; flex-direction: column; gap: 1px; }

.month-header {
  font-size: 11px;
  font-weight: 700;
  color: var(--gray-400);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 20px 0 6px;
}
.month-header:first-child { padding-top: 0; }

.event-card {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 0 14px;
  align-items: start;
  margin-bottom: 4px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.12s, box-shadow 0.12s, transform 0.08s;
  box-shadow: var(--shadow);
}
.event-card:hover {
  border-color: var(--teal);
  box-shadow: 0 4px 20px rgba(0,191,174,0.12);
  transform: translateY(-1px);
}
.event-card.past { opacity: 0.5; }

.event-date {
  text-align: center;
  padding: 4px 0;
  border-right: 2px solid var(--gray-200);
}
.event-date .day {
  font-size: 22px; font-weight: 700;
  line-height: 1;
  color: var(--navy);
}
.event-date .mon {
  font-size: 10px;
  color: var(--gray-400);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.event-card.today .event-date { border-right-color: var(--teal); }
.event-card.today .event-date .day { color: var(--teal); }

.event-body { min-width: 0; }
.event-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.4;
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.event-meta {
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
}
.badge {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
}
.badge-source {
  background: var(--navy);
  color: #fff;
}
.badge-cat {
  background: var(--gray-100);
  color: var(--gray-600);
  border: 1px solid var(--gray-200);
}

.event-arrow {
  color: var(--gray-400);
  font-size: 16px;
  padding-top: 4px;
  align-self: center;
  flex-shrink: 0;
  transition: color 0.12s, transform 0.12s;
}
.event-card:hover .event-arrow { color: var(--teal); transform: translateX(2px); }

/* today highlight */
.event-card.today { border-left: 3px solid var(--teal); }

/* ── CALENDAR ─────────────────────────────────────────────────── */
.cal-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 14px;
}
.cal-header h2 { font-size: 18px; font-weight: 700; color: var(--navy); }
.cal-nav {
  background: none; border: 1px solid var(--gray-200);
  border-radius: var(--radius); padding: 4px 10px;
  cursor: pointer; font-size: 14px; color: var(--gray-600);
  transition: all 0.12s;
}
.cal-nav:hover { background: var(--gray-100); color: var(--navy); }

.cal-grid {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: var(--navy);
}
.cal-wd {
  text-align: center; padding: 8px 4px;
  font-size: 11px; font-weight: 700;
  color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.05em;
}
.cal-wd:first-child { color: #f87171; }
.cal-wd:last-child  { color: #60a5fa; }

.cal-days {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border-top: 1px solid var(--gray-200);
}
.cal-day {
  min-height: 72px;
  border-right: 1px solid var(--gray-200);
  border-bottom: 1px solid var(--gray-200);
  padding: 6px;
  vertical-align: top;
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day.other-month .cal-day-num { color: var(--gray-200); }
.cal-day.today .cal-day-num {
  background: var(--teal); color: #fff;
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.cal-day-num {
  font-size: 12px; font-weight: 600; color: var(--gray-600);
  margin-bottom: 3px;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.cal-events { display: flex; flex-direction: column; gap: 2px; }
.cal-event {
  font-size: 10px; font-weight: 500;
  background: var(--navy);
  color: #fff;
  border-radius: 3px;
  padding: 2px 4px;
  cursor: pointer;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  text-decoration: none;
  display: block;
  line-height: 1.4;
  transition: background 0.1s;
}
.cal-event:hover { background: var(--teal); }
.cal-event.cat-月會        { background: #1a3260; }
.cal-event.cat-年會        { background: #7c3aed; }
.cal-event.cat-繼教課程    { background: #0369a1; }
.cal-event.cat-工作坊,
.cal-event.cat-年會工作坊  { background: #065f46; }
.cal-event.cat-重症        { background: #9f1239; }
.cal-event.cat-ERAS        { background: #92400e; }
.cal-more {
  font-size: 10px; color: var(--gray-400);
  padding: 1px 4px; cursor: pointer;
}

/* ── EMPTY STATE ─────────────────────────────────────────────── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--gray-400);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ── FOOTER ──────────────────────────────────────────────────── */
footer {
  background: var(--navy);
  color: var(--gray-400);
  font-size: 12px;
  text-align: center;
  padding: 18px 20px;
  margin-top: 40px;
  line-height: 1.8;
}
footer a { color: var(--teal); text-decoration: none; }

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 600px) {
  .event-card {
    grid-template-columns: 50px 1fr auto;
    gap: 0 10px;
    padding: 10px 12px;
  }
  .event-date .day { font-size: 18px; }
  .filter-bar { padding: 10px 12px; }
  .cal-day { min-height: 56px; padding: 4px; }
  .cal-event { display: none; }
  .cal-day.has-events::after {
    content: '●';
    font-size: 8px;
    color: var(--teal);
    display: block;
    text-align: center;
  }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-pulse"></div>
      <div>
        <div class="logo-text">麻醉科進修雷達</div>
        <div class="logo-sub">自動彙整台灣麻醉相關學會課程</div>
      </div>
    </a>
    <div class="header-meta">更新：<span id="updated-at">—</span></div>
  </div>
</header>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('list', this)">📋 課程列表</button>
    <button class="tab-btn" onclick="switchTab('calendar', this)">📅 活動行事曆</button>
  </div>
</div>

<div class="page">

  <!-- Filter bar -->
  <div class="filter-bar">
    <span class="filter-label">來源</span>
    <div class="filter-chips" id="source-chips"></div>
    <div class="filter-divider"></div>
    <span class="filter-label">分類</span>
    <div class="filter-chips" id="cat-chips"></div>
    <div class="filter-divider"></div>
    <label class="toggle-past">
      <input type="checkbox" id="hide-past" checked onchange="render()">
      排除過期
    </label>
    <div class="filter-count" id="count-label"></div>
  </div>

  <!-- List view -->
  <div id="view-list">
    <div class="event-list" id="event-list"></div>
  </div>

  <!-- Calendar view -->
  <div id="view-calendar">
    <div class="cal-header">
      <button class="cal-nav" onclick="calMove(-1)">‹</button>
      <h2 id="cal-title"></h2>
      <button class="cal-nav" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-wd">日</div><div class="cal-wd">一</div>
        <div class="cal-wd">二</div><div class="cal-wd">三</div>
        <div class="cal-wd">四</div><div class="cal-wd">五</div>
        <div class="cal-wd">六</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
  </div>

</div>

<footer>
  資料自動彙整自各學會的公開公告頁，僅顯示標題與連結並導回原站，非官方彙整，實際資訊以原公告為準。<br>
  來源：TSA・疼痛醫學會・RAPM・TSCVA・TWERAS・TSCCM
</footer>

<script>
// ── State ────────────────────────────────────────────────────
let ALL_EVENTS = [];
let activeSources = new Set();
let activeCats    = new Set();
let calYear, calMonth;
const today = new Date();
today.setHours(0,0,0,0);

// ── Boot ─────────────────────────────────────────────────────
async function boot() {
  const r = await fetch('data/events.json').catch(() => null);
  if (!r || !r.ok) { showError(); return; }
  const data = await r.json();
  ALL_EVENTS = data.events || [];

  // Updated-at
  if (data.generated_at) {
    const d = new Date(data.generated_at);
    document.getElementById('updated-at').textContent =
      d.toLocaleString('zh-TW', { month:'numeric', day:'numeric',
                                   hour:'2-digit', minute:'2-digit' });
  }

  buildChips();
  calYear  = today.getFullYear();
  calMonth = today.getMonth();
  render();
}

function showError() {
  document.getElementById('event-list').innerHTML =
    `<div class="empty">
       <div class="empty-icon">⚠️</div>
       <p>無法載入 data/events.json<br>請先執行 <code>python run.py</code></p>
     </div>`;
}

// ── Chips ────────────────────────────────────────────────────
function buildChips() {
  const sources = [...new Set(ALL_EVENTS.map(e => e.source))].sort();
  const cats    = [...new Set(ALL_EVENTS.map(e => e.category))].sort();

  renderChips('source-chips', sources, activeSources);
  renderChips('cat-chips',    cats,    activeCats);
}

function renderChips(containerId, items, activeSet) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';

  const allBtn = document.createElement('div');
  allBtn.className = 'chip' + (activeSet.size === 0 ? ' active' : '');
  allBtn.textContent = '全部';
  allBtn.onclick = () => { activeSet.clear(); buildChips(); render(); };
  el.appendChild(allBtn);

  items.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (activeSet.has(item) ? ' active' : '');
    chip.textContent = item;
    chip.onclick = () => {
      if (activeSet.has(item)) activeSet.delete(item);
      else activeSet.add(item);
      buildChips(); render();
    };
    el.appendChild(chip);
  });
}

// ── Filter ───────────────────────────────────────────────────
function filteredEvents() {
  const hidePast = document.getElementById('hide-past').checked;
  return ALL_EVENTS.filter(e => {
    if (activeSources.size > 0 && !activeSources.has(e.source)) return false;
    if (activeCats.size    > 0 && !activeCats.has(e.category))  return false;
    if (hidePast && e.date) {
      const d = new Date(e.date); d.setHours(0,0,0,0);
      if (d < today) return false;
    }
    return true;
  });
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const events = filteredEvents();
  document.getElementById('count-label').innerHTML =
    `共 <b>${events.length}</b> 筆`;
  renderList(events);
  renderCalendar(events);
}

// ── List View ────────────────────────────────────────────────
const MON_ZH = ['1月','2月','3月','4月','5月','6月',
                 '7月','8月','9月','10月','11月','12月'];
const MON_EN = ['Jan','Feb','Mar','Apr','May','Jun',
                'Jul','Aug','Sep','Oct','Nov','Dec'];

function renderList(events) {
  const el = document.getElementById('event-list');
  if (!events.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>沒有符合條件的課程</p></div>`;
    return;
  }

  let html = '';
  let lastMonth = null;

  events.forEach(e => {
    const d   = e.date ? new Date(e.date + 'T00:00:00') : null;
    const mon = d ? `${d.getFullYear()}年 ${MON_ZH[d.getMonth()]}` : '日期未定';

    if (mon !== lastMonth) {
      html += `<div class="month-header">${mon}</div>`;
      lastMonth = mon;
    }

    const isPast   = d && d < today;
    const isToday  = d && d.getTime() === today.getTime();
    const dayNum   = d ? d.getDate()        : '—';
    const monAbbr  = d ? MON_EN[d.getMonth()] : '';

    const catClass = 'cat-' + (e.category || '').split('・')[0].split('/')[0];

    html += `
    <a class="event-card${isPast?' past':''}${isToday?' today':''}"
       href="${e.url}" target="_blank" rel="noopener">
      <div class="event-date">
        <div class="day">${dayNum}</div>
        <div class="mon">${monAbbr}</div>
      </div>
      <div class="event-body">
        <div class="event-title">${escHtml(e.title)}</div>
        <div class="event-meta">
          <span class="badge badge-source">${escHtml(e.source)}</span>
          <span class="badge badge-cat">${escHtml(e.category)}</span>
        </div>
      </div>
      <div class="event-arrow">›</div>
    </a>`;
  });

  el.innerHTML = html;
}

// ── Calendar View ─────────────────────────────────────────────
function renderCalendar(events) {
  const y = calYear, m = calMonth;
  const title = `${y} 年 ${MON_ZH[m]}`;
  document.getElementById('cal-title').textContent = title;

  // Build event map: date string → events[]
  const map = {};
  events.forEach(e => {
    if (e.date) {
      if (!map[e.date]) map[e.date] = [];
      map[e.date].push(e);
    }
  });

  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev  = new Date(y, m, 0).getDate();

  let html = '';
  let cellCount = 0;

  // Prev month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
    cellCount++;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvents = map[dateStr] || [];
    const isToday   = dateStr === todayStr();
    const hasCls    = dayEvents.length ? ' has-events' : '';

    html += `<div class="cal-day${isToday?' today':''}${hasCls}">`;
    html += `<div class="cal-day-num">${d}</div>`;
    html += `<div class="cal-events">`;

    const show = dayEvents.slice(0, 2);
    show.forEach(e => {
      const catKey = 'cat-' + (e.category||'').split('・')[0].split('/')[0];
      html += `<a class="cal-event ${catKey}" href="${e.url}" target="_blank"
                  rel="noopener" title="${escHtml(e.title)}">${escHtml(e.title)}</a>`;
    });
    if (dayEvents.length > 2) {
      html += `<div class="cal-more">+${dayEvents.length - 2} 更多</div>`;
    }

    html += `</div></div>`;
    cellCount++;
  }

  // Next month padding
  const remaining = 7 - (cellCount % 7);
  if (remaining < 7) {
    for (let d = 1; d <= remaining; d++) {
      html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
    }
  }

  document.getElementById('cal-days').innerHTML = html;
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar(filteredEvents());
}

// ── Tab switch ───────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-list').style.display     = tab === 'list'     ? 'block' : 'none';
  document.getElementById('view-calendar').style.display = tab === 'calendar' ? 'block' : 'none';
}

// ── Utils ────────────────────────────────────────────────────
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function todayStr() {
  return today.toISOString().slice(0,10);
}

// ── Go ───────────────────────────────────────────────────────
boot();
</script>
